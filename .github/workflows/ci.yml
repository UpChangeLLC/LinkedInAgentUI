name: CI

on:
  push:
    branches: [main, develop, dev-v2]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short --co -q 2>/dev/null || python -m pytest tests/ -v --tb=short
        env:
          AI_CLIENT: openai
          OPENAI_API_KEY: "test-key"

      - name: Syntax check all Python files
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" -not -path "./.venv/*" | while read f; do
            python -c "import ast; ast.parse(open('$f').read())" || exit 1
          done

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

      - name: Build check
        run: npx vite build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t career-analyzer:ci .
